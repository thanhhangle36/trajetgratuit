<!DOCTYPE html>

<head>

<title>pony</title>

<script>
window.onload = function () {

  const ua = navigator.userAgent || navigator.vendor || window.opera;

  const isMobile =
    /android/i.test(ua) ||
    /iPad|iPhone|iPod/.test(ua);

  if (isMobile) {

    window.location.href =
      "co.ponybikes.venus://redeem_coupon?coupon=ENCOREUN";

    setTimeout(function () {
      document.getElementById("fallback").style.display = "block";
    }, 1500);

  } else {

    window.location.replace(
      "https://apps.apple.com/fr/app/pony-v%C3%A9los-et-trottinettes/id1273866794"
    );

  }
};
</script>
